name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0          # full history improves Sonar new-code/blame relevancy
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Tests (unit + integration)
        run: uv run pytest -m "unit or integration" --cov=toro --cov-report=xml

      # Runs only when SONAR_TOKEN is set (skipped on forks / before setup, so CI
      # stays green). Config is passed inline; there is no sonar-project.properties.
      - name: SonarCloud scan
        if: env.SONAR_TOKEN
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=ilovepixelart
            -Dsonar.projectName=toro
            -Dsonar.projectKey=ilovepixelart_toro
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=toro
            -Dsonar.tests=tests
            -Dsonar.test.exclusions=tests/**
            -Dsonar.coverage.exclusions=tests/**
