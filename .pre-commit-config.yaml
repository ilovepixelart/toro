# All hooks run through `uv run`, so versions come from the lockfile - one
# source of truth shared by pre-commit, CI and dev, nothing to drift.
# Install once with:  uvx pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty
        name: ty type check
        entry: uv run ty check
        language: system
        pass_filenames: false
        types: [python]
